.gputest: &gputest
  if: build.message !~ /\[skip tests\]/

steps:
  - label: Julia 1.11 (CUDA)
    timeout_in_minutes: 60
    <<: *gputest
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          codecov: true
    agents:
      queue: "cuda"
    env:
      CI_USE_CUDA: "1"

  - label: Julia 1.11 (ROCm)
    timeout_in_minutes: 60
    <<: *gputest
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          codecov: true
    agents:
      queue: "rocm"
    env:
      CI_USE_ROCM: "1"

  - label: Julia 1.11 (oneAPI)
    timeout_in_minutes: 60
    <<: *gputest
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-test#v1: ~
      - JuliaCI/julia-coverage#v1:
          codecov: true
    agents:
      queue: "oneapi"
    env:
      CI_USE_ONEAPI: "1"

