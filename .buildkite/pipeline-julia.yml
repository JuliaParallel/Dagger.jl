.test: &test
  timeout_in_minutes: 120
  if: build.message !~ /\[skip tests\]/
  agents:
    queue: "juliaecosystem"
    sandbox_capable: "true"
    os: linux
    arch: x86_64
  command: "julia --project -e 'using Pkg; Pkg.develop(;path=\"lib/TimespanLogging\")'"

.gputest: &gputest
  timeout_in_minutes: 60
  if: build.message !~ /\[skip tests\]/

.bench: &bench
  # Run on every pull request (gating against >25% regressions vs master), and
  # on demand elsewhere via a "[run benchmarks]" commit message. Use
  # "[skip benchmarks]" to opt a PR out.
  if: (build.pull_request.id != null && build.message !~ /\[skip benchmarks\]/) || build.message =~ /\[run benchmarks\]/
  agents:
    queue: "juliaecosystem"
    sandbox_capable: "true"
    os: linux
    arch: x86_64
    num_cpus: 16

steps:
  - label: Julia 1 (multithreaded)
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    command: "julia --project -e 'using Pkg; Pkg.instantiate()'; julia -t $BUILDKITE_AGENT_META_DATA_NUM_CPUS test/runtests.jl -p 0"

  - label: Julia 1.10
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "1.10"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1.11
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1.12
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "1.12"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia nightly
    <<: *test
    plugins:
      - JuliaCI/julia#v1:
          version: "nightly"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1 (Windows)
    <<: *test
    agents:
      queue: "juliaecosystem"
      os: windows
      arch: x86_64
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1 (macOS)
    <<: *test
    agents:
      queue: "juliaecosystem"
      os: macos
      arch: x86_64
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          julia_args: "--threads=1"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: Julia 1.11 (OpenCL)
    <<: *gputest
    timeout_in_minutes: 20
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-test#v1:
      - JuliaCI/julia-coverage#v1:
          codecov: true
    agents:
      queue: "juliaecosystem"
      os: macos
      arch: aarch64
    env:
      CI_USE_OPENCL: "1"

  - label: Julia 1 - TimespanLogging
    <<: *test
    timeout_in_minutes: 20
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    command: "julia --project -e 'using Pkg; Pkg.instantiate(); Pkg.develop(;path=\"lib/TimespanLogging\"); Pkg.test(\"TimespanLogging\")'"

  - label: Julia 1 - DaggerWebDash
    <<: *test
    timeout_in_minutes: 20
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    command: "julia -e 'using Pkg; Pkg.develop(;path=pwd()); Pkg.develop(;path=\"lib/TimespanLogging\"); Pkg.develop(;path=\"lib/DaggerWebDash\"); include(\"lib/DaggerWebDash/test/runtests.jl\")'"

  - label: "Benchmarks (vs master)"
    timeout_in_minutes: 120
    <<: *bench
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
    command: "bash .buildkite/run_benchmarks.sh"
    env:
      JULIA_NUM_THREADS: "8"
      BENCHMARK_BASE_REV: "master"
      BENCHMARK_REGRESSION_THRESHOLD: "0.25"
      BENCHMARK_CI_THREADS: "8"
      # Keep CI runs bounded; tune as needed (see benchmark/benchmarks.jl).
      BENCHMARK_SCALE: "[1024, 4096]"
      BENCHMARK_SECONDS: "5"
      BENCHMARK_SAMPLES: "20"
      BENCHMARK_OUTPUT_DIR: "benchmark_results"
    artifacts:
      - "benchmark_results/**/*"

