name: CI

on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    env:
      JULIA_NUM_THREADS: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - {version: '1.10', os: ubuntu-latest, arch: x64}
          - {version: '1.11', os: ubuntu-latest, arch: x64}
          - {version: '1.12', os: ubuntu-latest, arch: x64}
          - {version: '1', os: ubuntu-latest, arch: x64}
          - {version: '1', os: windows-latest, arch: x64}
          - {version: '1', os: macos-26, arch: arm64}
          - {version: 'nightly', os: ubuntu-latest, arch: x64}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Develop local TimespanLogging
        run: julia --project=. -e 'using Pkg; Pkg.develop(path="lib/TimespanLogging")'
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests
        run: julia --code-coverage=user test/runtests.jl -t 2
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-multithreaded:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} (${{ matrix.arch }}) (multithreaded)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {version: '1.10', os: ubuntu-latest, arch: x64}
          - {version: '1.11', os: ubuntu-latest, arch: x64}
          - {version: '1.12', os: ubuntu-latest, arch: x64}
          - {version: '1', os: ubuntu-latest, arch: x64}
          - {version: '1', os: windows-latest, arch: x64}
          - {version: '1', os: macos-26, arch: arm64}
          - {version: 'nightly', os: ubuntu-latest, arch: x64}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Develop local TimespanLogging
        run: julia --project=. -e 'using Pkg; Pkg.develop(path="lib/TimespanLogging")'
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests (multithreaded, no extra workers)
        run: julia --code-coverage=user -t auto test/runtests.jl -p 0
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  opencl:
    name: Julia 1.11 (OpenCL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    env:
      JULIA_NUM_THREADS: '1'
      CI_USE_OPENCL: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.11'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Develop local TimespanLogging
        run: julia --project=. -e 'using Pkg; Pkg.develop(path="lib/TimespanLogging")'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  timespanlogging:
    name: Julia 1 - TimespanLogging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Test TimespanLogging
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.develop(;path="lib/TimespanLogging"); Pkg.test("TimespanLogging")'

  daggerwebdash:
    name: Julia 1 - DaggerWebDash
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Test DaggerWebDash
        run: julia -e 'using Pkg; Pkg.develop(;path=pwd()); Pkg.develop(;path="lib/TimespanLogging"); Pkg.develop(;path="lib/DaggerWebDash"); include("lib/DaggerWebDash/test/runtests.jl")'

  benchmarks:
    name: Benchmarks (vs master)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ !contains(github.event.head_commit.message, '[skip tests]') && !contains(github.event.head_commit.message, '[skip benchmarks]') }}
    permissions:
      contents: read
      pull-requests: write
    env:
      # `benchmark/ci.jl` compares the working tree ("dirty") against this base
      # revision and fails the job if any benchmark regresses past the threshold.
      BENCHMARK_BASE_REV: master
      BENCHMARK_REGRESSION_THRESHOLD: '0.25'
      BENCHMARK_CI_THREADS: '4'
      BENCHMARK_OUTPUT_DIR: benchmark_results
      # Keep the problem sizes/sampling modest: GitHub-hosted runners are shared,
      # 4 vCPU / ~16 GB, and noisier than dedicated benchmarking hardware. The
      # orchestrator is OOM-robust, but smaller scales keep wall-clock bounded.
      BENCHMARK_SCALE: '[256, 1024]'
      BENCHMARK_SECONDS: '3'
      BENCHMARK_SAMPLES: '5'
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the base revision (`master`) is resolvable by
          # AirspeedVelocity when it checks out the comparison revision.
          fetch-depth: 0
      - name: Fetch base revision
        run: git fetch -f origin "$BENCHMARK_BASE_REV:$BENCHMARK_BASE_REV" || git fetch origin "$BENCHMARK_BASE_REV" || true
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Run benchmarks (current vs master)
        run: julia --color=yes benchmark/ci.jl
      - name: Write job summary
        if: always()
        run: |
          if [ -f "${BENCHMARK_OUTPUT_DIR}/report.md" ]; then
            # `artifact://` plot refs only render in Buildkite annotations; drop
            # them here. The plots are still uploaded as job artifacts below.
            grep -v 'artifact://' "${BENCHMARK_OUTPUT_DIR}/report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark report was produced." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ${{ env.BENCHMARK_OUTPUT_DIR }}/
          if-no-files-found: ignore
      - name: Comment results on PR
        # Best-effort: fork PRs get a read-only token, so the comment will 403;
        # don't fail the job over it.
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = `${process.env.BENCHMARK_OUTPUT_DIR}/report.md`;
            if (!fs.existsSync(reportPath)) {
              core.info('No report.md found; skipping PR comment.');
              return;
            }
            const marker = '<!-- dagger-benchmarks -->';
            let body = fs.readFileSync(reportPath, 'utf8')
              .split('\n')
              .filter(line => !line.includes('artifact://'))
              .join('\n');
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            body = `${marker}\n${body}\n\n[Full results and plots](${runUrl}) (download the \`benchmark-results\` artifact).`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
